name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  integration:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      INITIAL_SYS_ADMIN_EMAIL: admin@mindspan.local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx supabase start
      - name: Export local Supabase credentials
        shell: bash
        run: |
          npx supabase status -o env > supabase-status.env
          source supabase-status.env
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SECRET_KEY=$SECRET_KEY" >> "$GITHUB_ENV"
      - run: npm run db:verify
      - run: npm run db:test:rls
      - run: npm run db:test:import
      - run: npm run db:test:auth
      - run: npx playwright install --with-deps
      - run: npm run test:e2e
