project_id = "mindspan"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[local_smtp]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000/auth/confirm", "http://localhost:3000/auth/confirm"]
enable_signup = true
minimum_password_length = 12

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.email.template.confirmation]
subject = "Confirm your Mindspan account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your Mindspan password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Your Mindspan sign-in link"
content_path = "./supabase/templates/magic-link.html"

[auth.email.template.invite]
subject = "You are invited to Mindspan"
content_path = "./supabase/templates/invite.html"

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.question-media]
public = false
file_size_limit = "50MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "image/svg+xml", "audio/mpeg", "audio/ogg", "audio/wav", "video/mp4", "video/webm"]

[storage.buckets.avatars]
public = false
file_size_limit = "5MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp"]
